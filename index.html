<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deepread 深读</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts: Noto Serif SC (serif), Long Cang (handwriting), Cormorant Garamorn (English serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;700&family=Long+Cang&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Noto Serif SC', serif;
        background-color: #FAF0E6; /* Linen */
      }

      /* Global Grainy Texture using SVG Filter */
      .grain-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.05;
        filter: contrast(120%) brightness(100%);
      }
      
      .grain-bg {
        width: 100%;
        height: 100%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='1'/%3E%3C/svg%3E");
      }

      /* Custom scrollbar for the reading view to be unobtrusive */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Vignette Effect */
      .vignette {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(74, 59, 41, 0.15) 100%);
        z-index: 9998;
      }

      .font-handwriting {
        font-family: 'Long Cang', cursive;
      }
      
      .font-serif-en {
        font-family: 'Cormorant Garamond', serif;
      }

      /* FangSong Stack for printing aesthetic */
      .font-fangsong {
        font-family: "FangSong", "STFangsong", "SimSun", serif;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.25",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0",
    "jszip": "https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"
  }
}
</script>
<!-- JSZip is required globally for epubjs in this environment -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<!-- epub.js must be loaded after JSZip. Loading it globally to avoid import issues with the UMD build -->
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <!-- Grain overlay for the whole app -->
    <div class="grain-overlay"><div class="grain-bg"></div></div>
    <!-- Vignette for the "focus" feel -->
    <div class="vignette"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
